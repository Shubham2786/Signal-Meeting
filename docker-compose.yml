# Runs the Signal Meetings prototype locally (server + web).
# Reads values from your .env (via `docker compose --env-file .env up` or a local .env).
# Boots in Stub mode with no keys; set AI_PROVIDER + keys to go live.
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # --- AI provider: stub | gemini | groq ---
      AI_PROVIDER: ${AI_PROVIDER:-stub}
      AUTO_CONFIRM_CONFIDENCE: ${AUTO_CONFIRM_CONFIDENCE:-0.8}
      PORT: "8080"

      # --- Groq (OpenAI-compatible; text + Whisper audio) ---
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEY_2: ${GROQ_API_KEY_2:-}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
      GROQ_TEXT_MODEL: ${GROQ_TEXT_MODEL:-llama-3.3-70b-versatile}
      GROQ_AUDIO_MODEL: ${GROQ_AUDIO_MODEL:-whisper-large-v3}

      # --- Gemini ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_BASE_URL: ${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai/}
      GEMINI_TEXT_MODEL: ${GEMINI_TEXT_MODEL:-gemini-2.5-flash}
      GEMINI_AUDIO_MODEL: ${GEMINI_AUDIO_MODEL:-gemini-2.5-pro}

      # --- Database: sqlite | supabase ---
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-sqlite}
      DATABASE_URL: ${DATABASE_URL:-file:./data/signal.db}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}

      # --- GitHub (optional) ---
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPO: ${GITHUB_REPO:-}
    ports:
      - "8080:8080"
    volumes:
      - signal-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  signal-data:
