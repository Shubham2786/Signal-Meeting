server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets with SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API routes to the server container.
    location = /health         { proxy_pass http://server:8080; }
    location /meetings          { proxy_pass http://server:8080; }
    location /action-items      { proxy_pass http://server:8080; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
}
